name: Release

on:
  push:
    branches:
      - main
      - v3
      - v4
      - alpha
      - beta
      - rc
      - legacy
      - v3-alpha
      - v3-beta
      - v3-rc
      - v3-legacy
      - v4-alpha
      - v4-beta
      - v4-rc
      - v4-legacy
      - 'v3/**'
      - 'v4/**'
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}
env:
  HUSKY: 0

permissions:
  contents: write # to create release (changesets/action)
  issues: write # to post issue comments (changesets/action)
  pull-requests: write # to create pull request (changesets/action)
  id-token: write # to use OpenID Connect token for provenance (changesets/action)

jobs:
  verify-supported-node:
    name: Verify on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.19.0, 22.12.0]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  release:
    name: Release
    needs: verify-supported-node
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npm authentication fallback
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$HOME/.npmrc"
          else
            echo "NPM_TOKEN is not set; relying on npm trusted publishing via OIDC"
          fi

      - name: Resolve release channel
        id: release-channel
        shell: bash
        run: |
          set -euo pipefail

          branch="${GITHUB_REF_NAME}"
          npm_tag="latest"
          pre_tag=""

          case "$branch" in
            main)
              ;;
            v3|legacy)
              npm_tag="$branch"
              ;;
            v4)
              npm_tag="$branch"
              pre_tag="$branch"
              ;;
            alpha|beta|rc)
              npm_tag="$branch"
              pre_tag="$branch"
              ;;
            v3-alpha|v3/alpha|v4-alpha|v4/alpha)
              npm_tag="${branch//\//-}"
              pre_tag="alpha"
              ;;
            v3-beta|v3/beta|v4-beta|v4/beta)
              npm_tag="${branch//\//-}"
              pre_tag="beta"
              ;;
            v3-rc|v3/rc|v4-rc|v4/rc)
              npm_tag="${branch//\//-}"
              pre_tag="rc"
              ;;
            v3-legacy|v3/legacy|v4-legacy|v4/legacy)
              npm_tag="${branch//\//-}"
              ;;
            *)
              echo "Unsupported release branch: $branch" >&2
              exit 1
              ;;
          esac

          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"
          echo "pre_tag=$pre_tag" >> "$GITHUB_OUTPUT"
          echo "Resolved npm dist-tag: $npm_tag"
          if [ -n "$pre_tag" ]; then
            echo "Resolved Changesets prerelease tag: $pre_tag"
          fi

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm release:version
          publish: pnpm release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CHANGESETS_NPM_TAG: ${{ steps.release-channel.outputs.npm_tag }}
          CHANGESETS_PRE_TAG: ${{ steps.release-channel.outputs.pre_tag }}
          npm_config_registry: https://registry.npmjs.org
          NPM_CONFIG_PROVENANCE: true

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
